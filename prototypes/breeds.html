<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>探索品种 - CatCat</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=DM+Sans:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
</head>
<body>
    <!-- 左侧固定导航 -->
    <nav class="side-nav">
        <a href="/" class="nav-logo">
            <span class="logo-text">CatCat</span>
        </a>
        <ul class="nav-links">
            <li><a href="/">
                <span class="iconify" data-icon="lucide:home"></span>
                <span>首页</span>
            </a></li>
            <li class="active"><a href="/breeds">
                <span class="iconify" data-icon="lucide:search"></span>
                <span>探索</span>
            </a></li>
            <li><a href="/adopt">
                <span class="iconify" data-icon="lucide:heart"></span>
                <span>领养</span>
            </a></li>
            <li><a href="/my-cats">
                <span class="iconify" data-icon="lucide:cat"></span>
                <span>我的猫</span>
            </a></li>
            <li><a href="/room">
                <span class="iconify" data-icon="lucide:sofa"></span>
                <span>房间</span>
            </a></li>
        </ul>
        <div class="nav-user">
            <a href="/login">
                <span class="iconify" data-icon="lucide:user"></span>
            </a>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 页面头部 -->
        <header class="page-header">
            <div class="header-content">
                <h1>探索品种</h1>
                <p>全世界 {{count}} 种喵星人，总有一款适合你</p>
            </div>
        </header>

        <!-- 筛选区域 -->
        <section class="filter-bar">
            <div class="search-wrapper">
                <span class="iconify search-icon" data-icon="lucide:search"></span>
                <input type="text" placeholder="搜索品种..." class="search-input">
            </div>
            <div class="filter-chips">
                <button class="chip active">全部</button>
                <button class="chip">
                    <span class="iconify" data-icon="lucide:map-pin"></span>
                    英国
                </button>
                <button class="chip">
                    <span class="iconify" data-icon="lucide:map-pin"></span>
                    美国
                </button>
                <button class="chip">
                    <span class="iconify" data-icon="lucide:map-pin"></span>
                    泰国
                </button>
                <button class="chip">
                    <span class="iconify" data-icon="lucide:map-pin"></span>
                    非洲
                </button>
            </div>
            <div class="filter-chips secondary">
                <button class="chip">短毛</button>
                <button class="chip">长毛</button>
                <button class="chip">无毛</button>
            </div>
        </section>

        <!-- 结果统计 -->
        <div class="results-info">
            <span>找到 12 个品种</span>
        </div>

        <!-- 品种网格 -->
        <section class="breeds-grid">
            <article class="breed-item">
                <div class="breed-image">
                    <img src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=500" alt="英国短毛猫">
                    <button class="favorite-btn">
                        <span class="iconify" data-icon="lucide:heart"></span>
                    </button>
                </div>
                <div class="breed-info">
                    <div class="breed-meta">
                        <span class="origin">🇬🇧 英国</span>
                        <span class="coat">短毛</span>
                    </div>
                    <h3>英国短毛猫</h3>
                    <p class="trait">安静、温和、适合公寓</p>
                    <a href="/breeds/british-shorthair" class="btn btn-text">
                        查看详情
                        <span class="iconify" data-icon="lucide:arrow-right"></span>
                    </a>
                </div>
            </article>

            <article class="breed-item">
                <div class="breed-image">
                    <img src="https://images.unsplash.com/photo-1573865526739-10659fec78a5?w=500" alt="波斯猫">
                    <button class="favorite-btn">
                        <span class="iconify" data-icon="lucide:heart"></span>
                    </button>
                </div>
                <div class="breed-info">
                    <div class="breed-meta">
                        <span class="origin">🇮🇷 波斯</span>
                        <span class="coat">长毛</span>
                    </div>
                    <h3>波斯猫</h3>
                    <p class="trait">优雅、安静、掉毛多</p>
                    <a href="/breeds/persian" class="btn btn-text">
                        查看详情
                        <span class="iconify" data-icon="lucide:arrow-right"></span>
                    </a>
                </div>
            </article>

            <article class="breed-item">
                <div class="breed-image">
                    <img src="https://images.unsplash.com/photo-1495360010541-f48722b34f7d?w=500" alt="暹罗猫">
                    <button class="favorite-btn">
                        <span class="iconify" data-icon="lucide:heart"></span>
                    </button>
                </div>
                <div class="breed-info">
                    <div class="breed-meta">
                        <span class="origin">🇹🇭 泰国</span>
                        <span class="coat">短毛</span>
                    </div>
                    <h3>暹罗猫</h3>
                    <p class="trait">话痨、聪明、粘人</p>
                    <a href="/breeds/siamese" class="btn btn-text">
                        查看详情
                        <span class="iconify" data-icon="lucide:arrow-right"></span>
                    </a>
                </div>
            </article>

            <article class="breed-item">
                <div class="breed-image">
                    <img src="https://images.unsplash.com/photo-1507668077129-56e32842fceb?w=500" alt="布偶猫">
                    <button class="favorite-btn">
                        <span class="iconify" data-icon="lucide:heart"></span>
                    </button>
                </div>
                <div class="breed-info">
                    <div class="breed-meta">
                        <span class="origin">🇺🇸 美国</span>
                        <span class="coat">长毛</span>
                    </div>
                    <h3>布偶猫</h3>
                    <p class="trait">粘人、温柔、掉毛严重</p>
                    <a href="/breeds/ragdoll" class="btn btn-text">
                        查看详情
                        <span class="iconify" data-icon="lucide:arrow-right"></span>
                    </a>
                </div>
            </article>

            <article class="breed-item">
                <div class="breed-image">
                    <img src="https://images.unsplash.com/photo-1529778873920-4da4926a72c2?w=500" alt="橘猫">
                    <button class="favorite-btn">
                        <span class="iconify" data-icon="lucide:heart"></span>
                    </button>
                </div>
                <div class="breed-info">
                    <div class="breed-meta">
                        <span class="origin">🇬🇧</span>
                        <span class="coat">短毛</span>
                    </div>
                    <h3>橘猫</h3>
                    <p class="trait">能吃、易胖、性格好</p>
                    <a href="/breeds/orange-tabby" class="btn btn-text">
                        查看详情
                        <span class="iconify" data-icon="lucide:arrow-right"></span>
                    </a>
                </div>
            </article>

            <article class="breed-item">
                <div class="breed-image">
                    <img src="https://images.unsplash.com/photo-1545249390-6bdfa286032f?w=500" alt="缅因猫">
                    <button class="favorite-btn">
                        <span class="iconify" data-icon="lucide:heart"></span>
                    </button>
                </div>
                <div class="breed-info">
                    <div class="breed-meta">
                        <span class="origin">🇺🇸 美国</span>
                        <span class="coat">长毛</span>
                    </div>
                    <h3>缅因猫</h3>
                    <p class="trait">体型大、温顺、吃的多</p>
                    <a href="/breeds/maine-coon" class="btn btn-text">
                        查看详情
                        <span class="iconify" data-icon="lucide:arrow-right"></span>
                    </a>
                </div>
            </article>
        </section>

        <!-- 加载更多 -->
        <div class="load-more">
            <button class="btn btn-outline">
                加载更多
                <span class="iconify" data-icon="lucide:chevron-down"></span>
            </button>
        </div>
    </main>

    <!-- 移动端底部导航 -->
    <nav class="mobile-nav">
        <a href="/"><span class="iconify" data-icon="lucide:home"></span></a>
        <a href="/breeds"><span class="iconify" data-icon="lucide:search"></span></a>
        <a href="/adopt"><span class="iconify" data-icon="lucide:heart"></span></a>
        <a href="/my-cats"><span class="iconify" data-icon="lucide:cat"></span></a>
        <a href="/room"><span class="iconify" data-icon="lucide:sofa"></span></a>
    </nav>

    <style>
        /* 页面头部 */
        .page-header {
            padding: 4rem 6rem 2rem;
            background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
        }

        .header-content h1 {
            font-family: var(--font-display);
            font-weight: 900;
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .header-content p {
            color: var(--text-secondary);
            font-size: 1.125rem;
        }

        /* 筛选栏 */
        .filter-bar {
            padding: 2rem 6rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            align-items: center;
            border-bottom: 1px solid var(--bg-tertiary);
            background: var(--white);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .search-wrapper {
            position: relative;
            flex: 0 0 280px;
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-input {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 3rem;
            border: 2px solid var(--bg-tertiary);
            border-radius: 100px;
            font-family: var(--font-display);
            font-size: 0.875rem;
            background: var(--bg-primary);
            transition: all 0.3s var(--ease-out-expo);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--white);
        }

        .filter-chips {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-chips.secondary {
            margin-left: auto;
        }

        .chip {
            padding: 0.5rem 1rem;
            border: 2px solid var(--bg-tertiary);
            border-radius: 100px;
            font-family: var(--font-display);
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            background: transparent;
            display: flex;
            align-items: center;
            gap: 0.375rem;
            transition: all 0.3s var(--ease-out-expo);
        }

        .chip .iconify {
            font-size: 0.875rem;
        }

        .chip:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .chip.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--white);
        }

        /* 结果信息 */
        .results-info {
            padding: 1.5rem 6rem;
            font-family: var(--font-display);
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        /* 品种网格 */
        .breeds-grid {
            padding: 0 6rem 4rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        .breed-item {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 20px var(--shadow);
            transition: all 0.5s var(--ease-out-expo);
        }

        .breed-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 50px var(--shadow-strong);
        }

        .breed-image {
            position: relative;
            aspect-ratio: 16/10;
            overflow: hidden;
        }

        .breed-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s var(--ease-out-expo);
        }

        .breed-item:hover .breed-image img {
            transform: scale(1.08);
        }

        .favorite-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px var(--shadow);
            color: var(--text-muted);
            transition: all 0.3s var(--ease-out-expo);
        }

        .favorite-btn:hover {
            color: #E57373;
            transform: scale(1.1);
        }

        .breed-info {
            padding: 1.5rem;
        }

        .breed-meta {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .breed-meta span {
            font-family: var(--font-display);
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .breed-info h3 {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.25rem;
            margin-bottom: 0.25rem;
        }

        .trait {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        /* 加载更多 */
        .load-more {
            text-align: center;
            padding: 3rem;
        }

        .load-more .btn-outline {
            border-color: var(--text-primary);
        }

        @media (max-width: 900px) {
            .page-header,
            .filter-bar,
            .results-info,
            .breeds-grid {
                padding-left: 2rem;
                padding-right: 2rem;
            }

            .filter-chips.secondary {
                margin-left: 0;
            }
        }
    </style>
</body>
</html>
