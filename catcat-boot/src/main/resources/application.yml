spring:
  application:
    name: catcat-boot
  profiles:
    active: dev
  main:
    allow-bean-definition-overriding: true
    allow-circular-references: true

  # 数据源配置
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:catcat}?useSSL=false&serverTimezone=GMT%2B8&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      connection-timeout: 5000
      maximum-pool-size: 20
      minimum-idle: 5
      connection-test-query: SELECT 1

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:10.0.13.38}
      port: ${REDIS_PORT:63790}
      database: ${REDIS_DATABASE:0}
      #password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          min-idle: 0
          max-idle: 8

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath:/mapper/*Mapper.xml
  type-aliases-package: com.catcat.boot.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# 服务器配置
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  tomcat:
    uri-encoding: UTF-8
    max-threads: 200
    accept-count: 100

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# 日志配置
logging:
  level:
    root: INFO
    com.catcat: DEBUG
    com.baomidou.mybatisplus: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'

# The Cat API 配置
cat-api:
  base-url: https://api.thecatapi.com/v1
  api-key: ${CAT_API_KEY:}

# 阿里云 OSS 配置
aliyun:
  oss:
    endpoint: ${OSS_ENDPOINT:oss-ap-southeast-1.aliyuncs.com}
    access-key-id: ${OSS_ACCESS_KEY_ID:REDACTED}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:REDACTED}
    bucket-name: ${OSS_BUCKET_NAME:chp-catcat}
    url-prefix: ${OSS_URL_PREFIX:https://chp-catcat.oss-ap-southeast-1.aliyuncs.com}

---
# 开发环境
spring:
  config:
    activate:
      on-profile: dev
logging:
  level:
    root: INFO
    com.catcat: DEBUG

---
# 测试环境
spring:
  config:
    activate:
      on-profile: test
logging:
  level:
    root: INFO
    com.catcat: INFO

---
# 生产环境
spring:
  config:
    activate:
      on-profile: prod
logging:
  level:
    root: WARN
    com.catcat: WARN
